<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Top shine highlight -->
  <rect x="24" y="24" width="464" height="220" rx="96" fill="url(#shine)"/>

  <!-- Music note group with shadow -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Note body (filled) -->
    <g transform="translate(-90, -10)">
      <!-- Note head -->
      <ellipse cx="45" cy="115" rx="38" ry="28" fill="#ffffff" transform="rotate(-20, 45, 115)"/>
      <!-- Note stem -->
      <rect x="72" y="-95" width="14" height="210" rx="7" fill="#ffffff"/>
      <!-- Note flag -->
      <path d="M 86 -95 Q 160 -55 160 -5 Q 160 25 130 15 Q 110 8 110 -20 L 86 -40 Z" fill="#ffffff"/>
      <!-- Secondary note head (eighth note style) -->
      <ellipse cx="155" cy="85" rx="30" ry="22" fill="#ffffff" opacity="0.6" transform="rotate(-20, 155, 85)"/>
    </g>

    <!-- Sound wave arcs -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M 110 0 Q 140 -30 170 0"/>
      <path d="M 120 20 Q 150 -10 180 20"/>
    </g>
  </g>
</svg>
